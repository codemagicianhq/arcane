name: 🐛 Bug report
description: Report a problem with the Arcane CLI or a spell
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill out the sections below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran (e.g. `spell init --profile full`).
      placeholder: |
        1. spell init
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Arcane version
      description: Output of `spell --version`
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS + Node.js version (`node --version`)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Any relevant terminal output. This will be rendered as code.
      render: shell
