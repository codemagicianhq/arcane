name: Publish

# Publishes arcane-cli to the public npm registry when a GitHub Release
# is published, authenticated via npm OIDC trusted publishing (no stored token).
# The release tag's version should match package.json "version".

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # for npm provenance + OIDC trusted publishing

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Update npm (OIDC trusted publishing needs npm >= 11.5)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm (OIDC trusted publishing — no token)
        run: npm publish --provenance --access public
