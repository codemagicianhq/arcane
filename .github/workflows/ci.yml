name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rebase-check:
    name: PR branch is rebased on target
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify origin/${{ github.base_ref }} is an ancestor of HEAD
        env:
          BASE: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE"
          if git merge-base --is-ancestor "origin/$BASE" HEAD; then
            echo "✅ PR branch has origin/$BASE in its history — rebased."
          else
            echo "::error::PR branch is behind origin/$BASE. Rebase before pushing: \`git fetch origin && git rebase origin/$BASE\`. See .arcane/governance/git-conventions.md → '🛑 Agent-mandatory pre-PR guard'."
            exit 1
          fi

  build-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
